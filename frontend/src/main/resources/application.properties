spring.application.name=club-management
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/clubdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=clubuser
spring.datasource.password=clubpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

user.service.url=${USER_SERVICE_URL:http://user-service:8081}
club.service.url=${CLUB_SERVICE_URL:http://club-service:8082}
request.service.url=${REQUEST_SERVICE_URL:http://request-service:8083}
project.service.url=${PROJECT_SERVICE_URL:http://project-service:8084}
event.service.url=${EVENT_SERVICE_URL:http://event-service:8085}
