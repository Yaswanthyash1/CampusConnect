<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Error - NITK Clubs</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'League Spartan', sans-serif;
            background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--accent);
        }
        
        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--accent2);
        }
        
        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .back-btn {
            padding: 12px 25px;
            background: linear-gradient(145deg,var(--accent),var(--accent2));
            color: #0c1f28;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, filter 0.2s;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>Oops! Something went wrong</h1>
        <div class="status" th:text="'Status: ' + ${status}">Status: 404</div>
        <div class="message" th:text="${message}">The page you're looking for couldn't be found.</div>
        <a href="/home" class="back-btn">Back to Home</a>
    </div>
<script>
    // Toast notification helper function
    function showToast(message) {
        var t = document.createElement('div');
        t.textContent = message;
        Object.assign(t.style, {
            position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-6px)',
            background: 'rgba(0,0,0,0.85)', color: '#fff', padding: '10px 14px', borderRadius: '8px',
            boxShadow: '0 6px 20px rgba(0,0,0,0.4)', zIndex: '11000', fontSize: '14px', opacity: '0',
            transition: 'opacity 0.2s ease, transform 0.2s ease'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() {
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
        });
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }
</script>
</body>
</html>
