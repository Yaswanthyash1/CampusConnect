<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Club Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin:0;
            font-family:'League Spartan',sans-serif;
            background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
            color:var(--text);
            min-height:100vh;
        }
        .navbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 40px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(12px);
            position:sticky;
            top:0;
            z-index:10;
        }
        .navbar h1 { margin:0; font-size:24px }
        .nav-btn {
            padding:8px 14px;
            border-radius:8px;
            border:none;
            background:linear-gradient(145deg,var(--accent),var(--accent2));
            color:#0c1f28;
            font-weight:600;
            text-decoration:none;
            cursor:pointer;
            margin-left:8px;
        }
        .container {
            max-width:1100px;
            margin:40px auto;
            padding:28px;
            background:var(--glass);
            border-radius:14px;
            box-shadow:var(--shadow);
        }
        h1 { color:var(--accent); margin-bottom:16px; }
        .club-details p { margin:6px 0; }
        .centered-buttons {
            text-align:center;
            margin:24px 0;
        }
        .centered-buttons .nav-btn { margin:0 10px; }
        .events-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
            gap:20px;
            margin-top:16px;
        }
        .event-card {
            background:rgba(255,255,255,0.1);
            border-radius:10px;
            padding:18px;
            box-shadow:var(--shadow);
            transition:transform 0.3s;
        }
        .event-card:hover { transform:translateY(-5px); }
        .event-card-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:12px;
        }
        .event-type {
            background:var(--accent);
            color:#0c1f28;
            padding:4px 10px;
            border-radius:12px;
            font-weight:500;
        }
        .event-meta p {
            margin:6px 0;
            font-size:14px;
        }
        .event-actions {
            margin-top:16px;
            text-align:right;
        }
        .btn-secondary {
            display:inline-block;
            padding:8px 14px;
            border-radius:8px;
            background:rgba(255, 255, 255, 0.2);
            color:var(--text);
            font-weight:600;
            text-decoration:none;
        }
        .empty-state {
            text-align:center;
            padding:40px 20px;
            border-radius:10px;
            background:rgba(255, 255, 255, 0.05);
            margin-top:30px;
        }
        .member-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(145deg, var(--accent), var(--accent2));
            color: #0c1f28;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            color: #222;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: #000;
            text-decoration: none;
            cursor: pointer;
        }

    .member-btn {
        text-decoration: none;
        color: inherit;
        cursor: pointer;
    }

    .member-btn:hover {
        text-decoration: underline;
    }
    </style>

</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>
<div class="container">
    <div class="dashboard">
        <h1 th:text="'Hi, ' + ${club.clubName} + ' Club Head!'"></h1>
        <div class="club-details">
            <p><strong>Type:</strong> <span th:text="${club.clubType}"></span></p>
            <p><strong>Faculty ID:</strong> <span th:text="${club.facultyId}"></span></p>
            <p><strong>Head SRN:</strong> <span th:text="${club.headSrn}"></span></p>
        </div>

        <div class="centered-buttons">
            <button class="nav-btn" onclick="showContent('members')">Members</button>
            <button class="nav-btn" onclick="showContent('events')">Events</button>
        </div>

        <!-- Members -->
        <div class="content" id="members-content" style="display:none;">
            <h3 th:text="'Members List:'"></h3>
            <ul>
                <li th:each="member : ${clubMembers}">
                    <a class="member-btn" th:href="@{'/member/' + ${member['SRN']}}" th:text="${member['SRN']}"></a>
                </li>
            </ul>
            <div class="modal" id="memberModal" style="display:none;">
                <div class="modal-content">
                    <span class="close" onclick="closeMemberModal()">&times;</span>
                    <h2>Member Details</h2>
                    <div id="memberDetails"></div>
                </div>
            </div>
        </div>

        <!-- Events -->
        <div class="content" id="events-content" style="display:none;">
            <h3>Upcoming Events:</h3>
            <div class="events-grid" th:if="${clubEvents != null and !#lists.isEmpty(clubEvents)}">
                <div class="event-card" th:each="event : ${clubEvents}">
                    <div class="event-card-header">
                        <h3 th:text="${event['eventname']}">Event Name</h3>
                        <span class="event-type" th:text="${event['type']}">Type</span>
                    </div>
                    <div class="event-meta">
                        <p><strong>📍</strong> <span th:text="${event['loc']}">Location</span></p>
                        <p><strong>📅</strong>
                            <span th:if="${event['timestamp']}"
                                  th:text="${#dates.format(event['timestamp'],'dd MMM yyyy HH:mm')}">Date</span>
                            <span th:unless="${event['timestamp']}">N/A</span>
                        </p>
                        <p><strong>🏛</strong> <span th:text="${event['clubname']}">Club</span></p>
                        <p><strong>💰</strong> ₹<span th:text="${event['budget']}">Budget</span></p>
                    </div>
                    <div class="event-actions">
                        <a class="btn-secondary" th:href="@{'/event-details/' + ${event['id']}}">View Details</a>
                    </div>
                </div>
            </div>
            <div class="empty-state" th:if="${clubEvents == null or #lists.isEmpty(clubEvents)}">
                <h3>No Events Found</h3>
                <p>There are currently no upcoming events.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function showContent(option) {
        document.getElementById("members-content").style.display = "none";
        document.getElementById("events-content").style.display = "none";
        if (option === "members") {
            document.getElementById("members-content").style.display = "block";
        } else if (option === "events") {
            document.getElementById("events-content").style.display = "block";
        }
    }

    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            window.location.href = '/login';
        });
    }

    // Prepare member data for modal
    const clubMembers = /*[[${clubMembers}]]*/ [];
    function showMemberDetails(index) {
        const member = clubMembers[index];
        if (!member) return;
        let html = '<ul>';
        for (const key in member) {
            if (member.hasOwnProperty(key)) {
                html += `<li><strong>${key}:</strong> ${member[key]}</li>`;
            }
        }
        html += '</ul>';
        document.getElementById('memberDetails').innerHTML = html;
        document.getElementById('memberModal').style.display = 'block';
    }
    function closeMemberModal() {
        document.getElementById('memberModal').style.display = 'none';
    }
</script>
</body>
</html>
