<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Add Project</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:900px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h1,h2{color:var(--accent)}
        label{display:block;margin:10px 0 6px;font-weight:600}
        input, textarea, select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text);margin-bottom:10px}
        input:focus, textarea:focus, select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(62,193,211,0.2)}
        button{padding:12px 20px;border-radius:10px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:700;cursor:pointer;transition:transform 0.2s ease}
        button:hover{transform:translateY(-2px)}
        .message{margin-bottom:12px;padding:10px;border-radius:8px}
        .form-group{margin-bottom:20px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        @media (max-width: 768px){.form-row{grid-template-columns:1fr}}
        .btn-container{display:flex;gap:10px;margin-top:20px}
        .btn-secondary{background:rgba(255,255,255,0.1);color:var(--text);border:2px solid rgba(255,255,255,0.2)}
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home">Home</a>
        <a class="nav-btn" href="/pending-tasks">Back to Tasks</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="container">
    <h1>Add Project</h1>

    <div style="color: green; text-align: center; margin-bottom: 10px;" th:if="${success}">[[${success}]]</div>
    <div style="color: red; text-align: center; margin-bottom: 10px;" th:if="${error}">[[${error}]]</div>

    <form enctype="multipart/form-data" method="post" th:action="@{/addProject}">
        <!-- carry originating request id so we can mark it completed after creating the project -->
        <input type="hidden" id="fromRequest" name="fromRequest" value="" />
        <div class="form-group">
            <label for="clubname">Club Name:</label>
            <input id="clubname" name="clubname" placeholder="Enter club name" required type="text">
        </div>

        <div class="form-group">
            <label for="projectname">Project Name:</label>
            <input id="projectname" name="projectname" placeholder="Enter project name" required type="text">
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Describe the project objectives, scope, and deliverables" required
                      rows="4"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option value="Technical">Technical</option>
                    <option value="Research">Research</option>
                    <option value="Community Service">Community Service</option>
                    <option value="Innovation">Innovation</option>
                    <option value="Entrepreneurship">Entrepreneurship</option>
                    <option value="Academic">Academic</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority" name="priority" required>
                    <option value="">Select Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="startdate">Start Date:</label>
                <input id="startdate" name="startdate" required type="date">
            </div>

            <div class="form-group">
                <label for="enddate">Expected End Date:</label>
                <input id="enddate" name="enddate" required type="date">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="budget">Budget (₹):</label>
                <input id="budget" min="0" name="budget" placeholder="0.00" required step="0.01" type="number">
            </div>

            <div class="form-group">
                <label for="teamsize">Team Size:</label>
                <input id="teamsize" min="1" name="teamsize" placeholder="Number of team members" required
                       type="number">
            </div>
        </div>

        <div class="form-group">
            <label for="technologies">Technologies/Tools Required:</label>
            <textarea id="technologies" name="technologies" placeholder="List the technologies, tools, or resources needed for this project"
                      rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="objectives">Project Objectives:</label>
            <textarea id="objectives" name="objectives" placeholder="List the main objectives and goals of this project" required
                      rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="deliverables">Expected Deliverables:</label>
            <textarea id="deliverables" name="deliverables" placeholder="What will be delivered at the end of this project?" required
                      rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="mentor">Project Mentor/Supervisor:</label>
            <input id="mentor" name="mentor" placeholder="Name of faculty mentor or supervisor (optional)" type="text">
        </div>

        <div class="form-group">
            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="Planning">Planning</option>
                <option value="In Progress">In Progress</option>
                <option value="On Hold">On Hold</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label for="attachments">Project Proposal/Documents:</label>
            <input accept=".pdf,.doc,.docx,.txt" id="attachments" multiple name="attachments" type="file">
            <small style="color: var(--accent2); font-size: 14px;">Upload project proposal, requirements document, or
                other relevant files (PDF, DOC, DOCX, TXT)</small>
        </div>

        <div class="btn-container">
            <button type="submit">Create Project</button>
            <a class="nav-btn btn-secondary" href="/pending-tasks">Cancel</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        showToast('Logging out...');
        setTimeout(() => {
            window.location.href = '/login';
        }, 500);
        }
    });

        } else {
            showToast('End date set');
    // Set minimum date to today for start date
    document.getElementById('startdate').min = new Date().toISOString().split('T')[0];

    // Update end date minimum when start date changes
    document.getElementById('startdate').addEventListener('change', function() {
        document.getElementById('enddate').min = this.value;
    });

    // Validate end date is after start date
    document.getElementById('enddate').addEventListener('change', function() {
        const startDate = new Date(document.getElementById('startdate').value);
        const endDate = new Date(this.value);

        if (endDate <= startDate) {
            showToast('End date must be after start date');
            this.value = '';
        }
    });

    // Auto-fill club name if coming from a specific request
    const urlParams = new URLSearchParams(window.location.search);
    const fromRequest = urlParams.get('fromRequest');
    if (fromRequest) {
        // You can add logic here to fetch and pre-fill data from the request
        console.log('Creating project from request:', fromRequest);
        // set hidden form field so server can mark the original request completed after success
        const fr = document.getElementById('fromRequest');
        if (fr) fr.value = fromRequest;
    }

    // Toast notification helper function
    function showToast(message) {
        var t = document.createElement('div');
        t.textContent = message;
        // Position at top-center with a slight slide-down effect
        Object.assign(t.style, {
            position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-6px)',
            background: 'rgba(0,0,0,0.85)', color: '#fff', padding: '10px 14px', borderRadius: '8px',
            boxShadow: '0 6px 20px rgba(0,0,0,0.4)', zIndex: '11000', fontSize: '14px', opacity: '0',
            transition: 'opacity 0.2s ease, transform 0.2s ease'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() {
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
        });
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }

    // Display toast for success/error messages from server
    window.addEventListener('DOMContentLoaded', function() {
        const successMsg = document.querySelector('[style*="color: green"]');
        const errorMsg = document.querySelector('[style*="color: red"]');

        if (successMsg && successMsg.textContent.trim()) {
            showToast(successMsg.textContent.trim());
            // Hide the static message
            successMsg.style.display = 'none';
            // Redirect to projects-dashboard after showing toast
            setTimeout(function() {
                window.location.href = '/projects-dashboard';
            }, 2000);
        }

        if (errorMsg && errorMsg.textContent.trim()) {
            showToast(errorMsg.textContent.trim());
            // Hide the static message
            errorMsg.style.display = 'none';
        }
    });
</script>
</body>
</html>
