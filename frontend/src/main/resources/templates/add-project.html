<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Add Project</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364; --accent:#3ec1d3; --accent2:#a0e7e5; --text:#fff; --glass:rgba(255,255,255,.12); --shadow:0 10px 25px rgba(0,0,0,.35); --muted:rgba(255,255,255,.8); }
        *{box-sizing:border-box}
        body{margin:0;font-family:'League Spartan',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));background-attachment:fixed;color:var(--text);min-height:100vh}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:28px}
        .navbar .right{display:flex;gap:15px;align-items:center}
        .nav-btn{padding:8px 14px;border:none;border-radius:8px;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;cursor:pointer;transition:transform .15s ease;text-decoration:none}
        .nav-btn:hover{transform:scale(1.05)}
        .container{max-width:900px;margin:40px auto;padding:32px;background:var(--glass);border-radius:16px;box-shadow:var(--shadow)}
        .hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:18px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:22px}
        .hero h2{margin:0;color:var(--accent);font-size:26px}
        .hero-sub{color:var(--muted);font-size:14px}
        .badge{padding:8px 14px;border-radius:20px;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:700}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
        .row-span-2{grid-column:1 / -1}
        .form-group{display:flex;flex-direction:column;gap:8px}
        label{font-weight:700;color:var(--accent2);font-size:14px}
        input,textarea,select{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.15);color:var(--text)}
        textarea{min-height:110px;resize:vertical}
        input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(62,193,211,.2)}
        .hint{font-size:13px;color:var(--muted)}
        .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
        .btn{padding:12px 20px;border:none;border-radius:25px;font-weight:700;cursor:pointer;transition:all .2s ease}
        .btn-primary{background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28}
        .btn-secondary{background:rgba(255,255,255,.1);color:var(--text);border:2px solid rgba(255,255,255,.2)}
        .btn:hover{transform:translateY(-2px);filter:brightness(1.07)}
        @media (max-width:780px){.form-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div class="right">
        <a class="nav-btn" th:href="@{/pending-tasks}">Back to Tasks</a>
        <a class="nav-btn" th:href="@{/home}">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="container">
    <div class="hero">
        <div>
            <h2>Create Project</h2>
            <div class="hero-sub">Provide details to add a new project for your club</div>
        </div>
        <div class="badge" id="fromRequestBadge" style="display:none">From Request</div>
    </div>

    <div style="color:#50d890;text-align:center;margin-bottom:10px" th:if="${success}">[[${success}]]</div>
    <div style="color:#ff6b6b;text-align:center;margin-bottom:10px" th:if="${error}">[[${error}]]</div>

    <form th:action="@{/addProject}" method="post" enctype="multipart/form-data">
        <input type="hidden" id="fromRequest" name="fromRequest" value="" />

        <div class="form-grid">
            <div class="form-group">
                <label for="clubname">Club Name</label>
                <input id="clubname" name="clubname" type="text" placeholder="e.g., ISTE" required>
            </div>
            <div class="form-group">
                <label for="projectname">Project Name</label>
                <input id="projectname" name="projectname" type="text" placeholder="e.g., Campus Connect Portal" required>
            </div>

            <div class="form-group row-span-2">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Describe the project's goals, scope, and impact" required rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option>Technical</option>
                    <option>Research</option>
                    <option>Community Service</option>
                    <option>Innovation</option>
                    <option>Entrepreneurship</option>
                    <option>Academic</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                    <option value="">Select Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>

            <div class="form-group">
                <label for="startdate">Start Date</label>
                <input id="startdate" name="startdate" type="date" required>
            </div>
            <div class="form-group">
                <label for="enddate">Expected End Date</label>
                <input id="enddate" name="enddate" type="date" required>
            </div>

            <div class="form-group">
                <label for="budget">Budget (₹)</label>
                <input id="budget" name="budget" type="number" min="0" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="teamsize">Team Size</label>
                <input id="teamsize" name="teamsize" type="number" min="1" placeholder="Number of team members" required>
            </div>

            <div class="form-group row-span-2">
                <label for="technologies">Technologies/Tools</label>
                <textarea id="technologies" name="technologies" placeholder="List technologies, tools, or resources"></textarea>
            </div>

            <div class="form-group">
                <label for="objectives">Project Objectives</label>
                <textarea id="objectives" name="objectives" placeholder="Main objectives and goals" required rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="deliverables">Expected Deliverables</label>
                <textarea id="deliverables" name="deliverables" placeholder="What will be delivered?" required rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="mentor">Project Mentor/Supervisor</label>
                <input id="mentor" name="mentor" type="text" placeholder="Optional">
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option>Planning</option>
                    <option>In Progress</option>
                    <option>On Hold</option>
                    <option>Completed</option>
                </select>
            </div>

            <div class="form-group row-span-2">
                <label for="attachments">Project Documents</label>
                <input id="attachments" name="attachments" type="file" multiple accept=".pdf,.doc,.docx,.txt">
                <div class="hint">Upload proposals or relevant files (PDF, DOC, DOCX, TXT)</div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" type="submit">Create Project</button>
            <a class="btn btn-secondary" th:href="@{/pending-tasks}">Cancel</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        showToast('Logging out...');
        setTimeout(() => { window.location.href = '/login'; }, 500);
    });

    // Set minimum start date to today
    const start = document.getElementById('startdate');
    if (start) start.min = new Date().toISOString().split('T')[0];

    // Keep end date after start
    const end = document.getElementById('enddate');
    if (start && end) {
        start.addEventListener('change', function(){ end.min = this.value; });
        end.addEventListener('change', function(){ const s = new Date(start.value); const e = new Date(this.value); if (e <= s){ showToast('End date must be after start date'); this.value=''; } });
    }

    // Carry originating request id
    const urlParams = new URLSearchParams(window.location.search);
    const fromRequest = urlParams.get('fromRequest');
    if (fromRequest) {
        const fr = document.getElementById('fromRequest'); if (fr) fr.value = fromRequest;
        const badge = document.getElementById('fromRequestBadge'); if (badge) badge.style.display = 'inline-block';
        console.log('Creating project from request:', fromRequest);
    }

    // Toast helper
    function showToast(message){
        const t = document.createElement('div'); t.textContent = message;
        Object.assign(t.style, { position:'fixed', top:'20px', left:'50%', transform:'translateX(-50%) translateY(-6px)', background:'rgba(0,0,0,0.85)', color:'#fff', padding:'10px 14px', borderRadius:'8px', boxShadow:'0 6px 20px rgba(0,0,0,0.4)', zIndex:'11000', fontSize:'14px', opacity:'0', transition:'opacity .2s ease, transform .2s ease' });
        document.body.appendChild(t);
        requestAnimationFrame(()=>{ t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)'; });
        setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(-6px)'; setTimeout(()=> t.remove(), 300); }, 2200);
    }

    // Surface server messages then redirect or keep page
    window.addEventListener('DOMContentLoaded', function(){
        const ok = document.querySelector('[style*="color: green"]');
        const err = document.querySelector('[style*="color: red"]');
        if (ok && ok.textContent.trim()){ showToast(ok.textContent.trim()); ok.style.display='none'; setTimeout(()=> location.href='/projects-dashboard', 2000); }
        if (err && err.textContent.trim()){ showToast(err.textContent.trim()); err.style.display='none'; }
    });
</script>
</body>
</html>
