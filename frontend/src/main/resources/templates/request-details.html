<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Request Details</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.12);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
            --muted: rgba(255, 255, 255, 0.8);
        }
        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .navbar h1 { margin:0; font-size:28px; }
        .navbar .right { display: flex; gap: 15px; align-items: center; }
        .nav-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(145deg,var(--accent),var(--accent2));
            color: #0c1f28;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s ease;
            text-decoration: none;
        }
        .nav-btn:hover { transform: scale(1.05); }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 32px;
            background: var(--glass);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .request-header {
            display: flex;
            gap: 22px;
            align-items: flex-start;
            padding: 22px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .header-left { flex: 1; }
        .header-title {
            font-size: 28px;
            margin: 0 0 6px;
            color: var(--accent);
        }
        .header-sub {
            color: var(--muted);
            margin: 0 0 12px;
            font-size: 16px;
        }
        .header-type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            background: linear-gradient(145deg, var(--accent), var(--accent2));
            color: #0c1f28;
        }
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .detail-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--accent);
        }
        .detail-card .label {
            font-weight: 700;
            color: var(--accent2);
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .detail-card .value {
            color: var(--text);
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .description-section {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
        }
        .description-section .label {
            font-weight: 700;
            color: var(--accent2);
            margin-bottom: 12px;
            display: block;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .description-section .content {
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: #6c757d; color: #fff; }
        .status-accepted { background: #17a2b8; color: #fff; }
        .status-rejected { background: #dc3545; color: #fff; }
        .status-completed { background: #28a745; color: #fff; }
        .back-section {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(145deg, var(--accent), var(--accent2));
            color: #0c1f28;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .file-info {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .file-name {
            color: var(--accent2);
            font-weight: 600;
            margin-bottom: 5px;
        }
        .file-path {
            color: var(--muted);
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div class="right">
        <a class="nav-btn" href="/pending-tasks">Back to Tasks</a>
        <a class="nav-btn" href="/home">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="container">
    <div class="request-header">
        <div class="header-left">
            <h1 class="header-title">Request Details</h1>
            <div class="header-sub">Submitted by: <span th:text="${request.memberId}">Member ID</span></div>
            <div class="header-type" th:text="${request.type}">Request Type</div>
        </div>
    </div>

    <div class="details-grid">
        <div class="detail-card">
            <span class="label">Request ID</span>
            <div class="value" th:text="${request.id}">ID</div>
        </div>
        <div class="detail-card">
            <span class="label">Member SRN</span>
            <div class="value" th:text="${request.memberId}">Member ID</div>
        </div>
        <div class="detail-card">
            <span class="label">Type</span>
            <div class="value" th:text="${request.type}">Type</div>
        </div>
        <div class="detail-card">
            <span class="label">Status</span>
            <div class="value">
                <span class="status-badge"
                      th:classappend="${request.status == 'pending'} ? 'status-pending' :
                                     (${request.status == 'accepted'} ? 'status-accepted' :
                                     (${request.status == 'rejected'} ? 'status-rejected' : 'status-completed'))"
                      th:text="${request.status}">Status</span>
            </div>
        </div>
        <div class="detail-card">
            <span class="label">Submitted</span>
            <div class="value" th:text="${request.timestamp}">Timestamp</div>
        </div>
        <div class="detail-card" th:if="${request.clubName}">
            <span class="label">Target Club</span>
            <div class="value" th:text="${request.clubName}">Club Name</div>
        </div>
    </div>

    <div class="description-section">
        <span class="label">Description</span>
        <div class="content" th:text="${request.description}">Request description goes here...</div>
    </div>

    <div class="detail-card" th:if="${request.filePath}">
        <span class="label">Attached File</span>
        <div class="value">
            <div class="file-info">
                <div class="file-name" th:text="${request.fileName}">File Name</div>
                <div class="file-path" th:text="${request.filePath}">File Path</div>
                <a class="btn btn-secondary" style="margin-top: 10px;" th:href="@{'/request/file/' + ${request.id}}">
                    📁 Download File
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '/login';
    });
</script>
</body>
</html>
