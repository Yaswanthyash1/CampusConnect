<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Club Head - View Member Requests</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'League Spartan',sans-serif; background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3)); color:var(--text); min-height:100vh; }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:1100px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h2{color:var(--accent);text-align:center;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
        th,td{padding:12px 10px;text-align:left}
        th{background:var(--accent2);color:#0c1f28}
        tr:nth-child(even){background:rgba(255,255,255,0.03)}
        a.download-link{color:var(--accent2);text-decoration:underline;font-weight:600}
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home" style="margin-right:12px;">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>
<div class="container">
    <h2>All Member Requests</h2>
    <table>
        <thead>
        <tr>
            <th>Type</th>
            <th>Description</th>
            <th>Member</th>
            <th>Status</th>
            <th>Timestamp</th>
            <th>File</th>
            <th th:if="${isClubHead}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.type}"></td>
            <td th:text="${req.description}"></td>
            <td th:text="${req.memberId}"></td>
            <td th:text="${req.status}"></td>
            <td th:text="${req.timestamp != null ? req.timestamp : 'N/A'}"></td>
            <td>
                <a class="download-link" target="_blank"
                   th:href="@{/download/{filename}(filename=${req.filePath})}"
                   th:if="${req.filePath != null and req.filePath != ''}"
                   th:text="${req.fileName != null ? req.fileName : 'Download'}">Download</a>
                <span th:if="${req.filePath == null or req.filePath == ''}">No file</span>
            </td>
            <td th:if="${isClubHead}">
                <form class="request-action-form" method="post" style="display:inline-block;margin-right:6px;"
                      th:action="@{|/club/${clubName}/requests|}">
                    <input name="requestId" th:value="${req.id}" type="hidden"/>
                    <input name="action" type="hidden" value="accept"/>
                    <button class="nav-btn" style="background:green;color:white;padding:6px 10px;border-radius:6px;"
                            type="submit">Accept
                    </button>
                </form>
                <form class="request-action-form" method="post" style="display:inline-block;" th:action="@{|/club/${clubName}/requests|}">
                    <input name="requestId" th:value="${req.id}" type="hidden"/>
                    <input name="action" type="hidden" value="reject"/>
                    <button class="nav-btn" style="background:#c0392b;color:white;padding:6px 10px;border-radius:6px;"
                            type="submit">Reject
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script>
    // Logout handler for member page
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            try {
                localStorage.clear();
            } catch (e) {
                // ignore
            }
            showToast('Logging out...');
            // Redirect to server-side logout which will invalidate any session and then send user to login
            setTimeout(() => {
                window.location.href = '/login';
            }, 500);
        });
    }

    // Delegate submit of request action forms and perform AJAX POST
    document.addEventListener('submit', function (e) {
        const form = e.target.closest && e.target.closest('.request-action-form');
        if (!form) return; // not one of our forms
        e.preventDefault();

        // find inputs
        const actionInput = form.querySelector('input[name="action"]');
        const idInput = form.querySelector('input[name="requestId"]');
        const action = actionInput ? actionInput.value : null;
        const requestId = idInput ? idInput.value : null;
        const url = form.getAttribute('action') || form.getAttribute('th:action') || window.location.pathname;

        if (!action || !requestId) {
            showToast('Invalid request data');
            return;
        }

        // Disable buttons to prevent double submits
        const buttons = form.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        const payload = new URLSearchParams();
        payload.append('requestId', requestId);
        payload.append('action', action);

        // Build headers and include CSRF token if available (meta tags are commonly used with Spring Security)
        const headers = { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' };
        const csrfMeta = document.querySelector('meta[name="_csrf"]');
        if (csrfMeta) {
            const csrfToken = csrfMeta.getAttribute('content');
            const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
            const csrfHeader = csrfHeaderMeta ? csrfHeaderMeta.getAttribute('content') : 'X-CSRF-TOKEN';
            if (csrfToken) headers[csrfHeader] = csrfToken;
        }

        fetch(url, {
            method: 'POST',
            headers: headers,
            body: payload.toString(),
            redirect: 'follow'
        }).then(function (response) {
            const contentType = (response.headers.get('content-type') || '').toLowerCase();

            function removeRowWithAnimation(tr) {
                if (!tr) return;
                const height = tr.offsetHeight + 'px';
                tr.style.boxSizing = 'border-box';
                tr.style.transition = 'opacity 0.25s ease, transform 0.25s ease, height 0.25s ease, padding 0.25s ease, margin 0.25s ease';
                tr.style.height = height;
                requestAnimationFrame(function() {
                    tr.style.opacity = '0';
                    tr.style.transform = 'translateX(-10px)';
                    tr.style.height = '0';
                    tr.style.paddingTop = '0';
                    tr.style.paddingBottom = '0';
                    tr.style.marginTop = '0';
                    tr.style.marginBottom = '0';
                });
                setTimeout(function() {
                    if (tr && tr.parentNode) {
                        const tbody = tr.parentNode;
                        tbody.removeChild(tr);
                        const remaining = tbody.querySelectorAll('tr').length;
                        if (remaining === 0) {
                            const colCount = document.querySelectorAll('table thead th').length || 1;
                            const placeholder = document.createElement('tr');
                            const td = document.createElement('td');
                            td.colSpan = colCount;
                            td.style.textAlign = 'center';
                            td.style.padding = '20px';
                            td.style.opacity = '0.9';
                            td.textContent = 'No pending requests';
                            placeholder.appendChild(td);
                            tbody.appendChild(placeholder);
                        }
                    }
                }, 300);
            }

            if (contentType.indexOf('application/json') !== -1) {
                return response.json().then(function (data) {
                    if (response.ok) {
                        const msg = data && data.message ? data.message : ('Request ' + (action === 'accept' ? 'accepted' : 'rejected') + ' successfully');
                        showToast(msg);
                        const tr = form.closest('tr');
                        removeRowWithAnimation(tr);
                    } else {
                        const msg = data && data.message ? data.message : ('Failed to ' + action + ' (status ' + response.status + ')');
                        showToast(msg);
                        buttons.forEach(b => b.disabled = false);
                    }
                }).catch(function (err) {
                    console.error('Error parsing JSON response:', err);
                    if (response.ok) {
                        showToast('Request ' + (action === 'accept' ? 'accepted' : 'rejected') + ' successfully');
                        removeRowWithAnimation(form.closest('tr'));
                    } else {
                        showToast('Failed to ' + action + ' (status ' + response.status + ')');
                        buttons.forEach(b => b.disabled = false);
                    }
                });
            } else {
                // Non-JSON response
                if (response.ok) {
                    showToast('Request ' + (action === 'accept' ? 'accepted' : 'rejected') + ' successfully');
                    removeRowWithAnimation(form.closest('tr'));
                } else {
                    showToast('Failed to ' + action + ' (status ' + response.status + ')');
                    buttons.forEach(b => b.disabled = false);
                }
            }
        }).catch(function (err) {
            console.error('Error submitting request action:', err);
            showToast('Error processing request');
            buttons.forEach(b => b.disabled = false);
        });
    });

    // Toast notification helper function
    function showToast(message) {
        var t = document.createElement('div');
        t.textContent = message;
        Object.assign(t.style, {
            position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-6px)',
            background: 'rgba(0,0,0,0.85)', color: '#fff', padding: '10px 14px', borderRadius: '8px',
            boxShadow: '0 6px 20px rgba(0,0,0,0.4)', zIndex: '11000', fontSize: '14px', opacity: '0',
            transition: 'opacity 0.2s ease, transform 0.2s ease'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() {
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
        });
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }
</script>
</body>
</html>
