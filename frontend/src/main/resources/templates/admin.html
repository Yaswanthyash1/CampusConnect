<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Club Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root{
            --bg1:#0f2027;--bg2:#203a43;--bg3:#2c5364;--accent:#3ec1d3;--accent2:#a0e7e5;--text:#ffffff;--glass:rgba(255,255,255,0.08);--shadow:0 10px 25px rgba(0,0,0,0.35)
        }
        *{box-sizing:border-box}
        body{margin:0;font-family:'League Spartan',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text);min-height:100vh}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:1000px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h1,h3{color:var(--accent)}
        .logout-btn{padding:8px 12px;border-radius:8px;background:linear-gradient(145deg,var(--accent),var(--accent2));border:none;color:#0c1f28;font-weight:600}
        body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 0;
          background-color: #fff;
          color: #333;
        }

        .club-member-dashboard {
          max-width: 800px;
          margin: 20px auto;
          padding: 20px;
          border: 1px solid #ccc;
          border-radius: 5px;
          background-color: #f0f8ff; /* light blue */
        }

        .header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 20px;
        }

        .logout-btn {
          background-color: #3ec1d3; /* blue */
          color: #fff;
          border: none;
          padding: 8px 16px;
          border-radius: 5px;
          cursor: pointer;
          transition: background-color 0.3s ease;
        }

        .logout-btn:hover {
          background-color: #36a4b5; /* darker blue on hover */
        }

        .club-list {
          margin-bottom: 20px;
        }

        .upcoming-events-member {
          background-color: #fff;
          padding: 20px;
          border-radius: 5px;
        }

        label {
          margin-right: 10px;
        }

        select {
          padding: 8px;
          border: 1px solid #ccc;
          border-radius: 5px;
        }

        select:focus {
          outline: none;
        }

        .club-details p {
          margin-bottom: 10px;
        }

        .club-details p:last-child {
          margin-bottom: 0;
        }

    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home" style="margin-right:12px;">Home</a>
        <button class="logout-btn" onclick="localStorage.clear();window.location.href='/login'">Logout</button>
    </div>
</div>
<div class="container">
    <div class="club-member-dashboard">
        <div class="header">
            <h1>Hi, Club Admin!</h1>
            <button class="logout-btn">Logout</button>
        </div>
        <div class="club-list">
            <h3>Club Details:</h3>
            <div class="club-details">
                <p>Type: Example Type</p>
                <p>Faculty ID: Example Faculty ID</p>
                <p>Head SRN: Example Head SRN</p>
            </div>

            <nav style="margin-top: 18px;">
                <label for="options">Select an option:</label>
                <select id="options">
                    <option value="">Select an option</option>
                    <option value="members">Members</option>
                    <option value="events">Events</option>
                </select>
            </nav>

            <div class="upcoming-events-member">
                <!-- Render the selected component here -->
                <!-- For Members component -->
                <div>
                    <p style="text-align: center; margin-top: 10px;">Member Count: 10</p>
                    <!-- Member list can go here -->
                </div>

                <!-- For Events component -->
                <div>
                    <!-- Event list can go here -->
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    // Toast notification helper function
    function showToast(message) {
        var t = document.createElement('div');
        t.textContent = message;
        Object.assign(t.style, {
            position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-6px)',
            background: 'rgba(0,0,0,0.85)', color: '#fff', padding: '10px 14px', borderRadius: '8px',
            boxShadow: '0 6px 20px rgba(0,0,0,0.4)', zIndex: '11000', fontSize: '14px', opacity: '0',
            transition: 'opacity 0.2s ease, transform 0.2s ease'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() {
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
        });
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }
</script>
</body>
</html>
