<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Add Event</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:900px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h1,h2{color:var(--accent)}
        label{display:block;margin:10px 0 6px}
        input, textarea, select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text)}
        button{padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:700;cursor:pointer}
        .message{margin-bottom:12px;padding:10px;border-radius:8px}
    </style>
</head>
<body>
<div class="container"> <!-- Main container with reduced height -->
    <h1>Add Event</h1> <!-- Page heading -->

    <div style="color: green; text-align: center; margin-bottom: 10px;" th:if="${success}">[[${success}]]</div>
    <div style="color: red; text-align: center; margin-bottom: 10px;" th:if="${error}">[[${error}]]</div>
    <form enctype="multipart/form-data" method="post" th:action="@{/addEvent}">
        <input type="hidden" id="fromRequest" name="fromRequest" value="" />
        <label for="clubname">Club Name:</label>
        <input id="clubname" name="clubname" required type="text">

        <label for="eventname">Event Name:</label>
        <input id="eventname" name="eventname" required type="text">

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea>

        <label for="location">Location:</label>
        <input id="location" name="location" required type="text">

        <label for="type">Type:</label>
        <input id="type" name="type" required type="text">

        <label for="timestamp">Timestamp:</label>
        <input id="timestamp" name="timestamp" required type="datetime-local">

        <label for="budget">Budget:</label>
        <input id="budget" name="budget" required type="number">

        <label for="registrationlink">Registration Link:</label>
        <input id="registrationlink" name="registrationlink" required type="text">

        <label for="banner">Banner:</label>
        <input id="banner" name="banner" type="file">

        <button type="submit">Submit</button>
    </form>

</div>
<script>
    // carry originating request id so server can mark request completed after event creation
    const urlParams = new URLSearchParams(window.location.search);
    const fromRequest = urlParams.get('fromRequest');
    if (fromRequest) {
        const fr = document.getElementById('fromRequest');
        if (fr) fr.value = fromRequest;
        console.log('Creating event from request:', fromRequest);
        showToast('Creating event from request #' + fromRequest);
    }

    // Add file selection notification
    const bannerInput = document.getElementById('banner');
    if (bannerInput) {
        bannerInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const file = this.files[0];
                if (file.size > 5 * 1024 * 1024) { // 5MB limit
                    showToast('File size exceeds 5MB limit');
                    this.value = '';
                } else {
                    showToast('Banner image selected: ' + file.name);
                }
            }
        });
    }

    // Add timestamp change notification
    const timestampInput = document.getElementById('timestamp');
    if (timestampInput) {
        timestampInput.addEventListener('change', function() {
            const selectedDate = new Date(this.value);
            const now = new Date();
            if (selectedDate < now) {
                showToast('Warning: Event date is in the past');
            } else {
                showToast('Event date set');
            }
        });
    }

    // Add budget change notification
    const budgetInput = document.getElementById('budget');
    if (budgetInput) {
        budgetInput.addEventListener('change', function() {
            if (this.value && parseFloat(this.value) > 0) {
                showToast('Budget set: ₹' + parseFloat(this.value).toLocaleString());
            }
        });
    }

    // Toast notification helper function
    function showToast(message) {
        var t = document.createElement('div');
        t.textContent = message;
        // Position at top-center with a slight slide-down effect
        Object.assign(t.style, {
            position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-6px)',
            background: 'rgba(0,0,0,0.85)', color: '#fff', padding: '10px 14px', borderRadius: '8px',
            boxShadow: '0 6px 20px rgba(0,0,0,0.4)', zIndex: '11000', fontSize: '14px', opacity: '0',
            transition: 'opacity 0.2s ease, transform 0.2s ease'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() {
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
        });
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }

    // Display toast for success/error messages from server
    window.addEventListener('DOMContentLoaded', function() {
        const successMsg = document.querySelector('[style*="color: green"]');
        const errorMsg = document.querySelector('[style*="color: red"]');

        if (successMsg && successMsg.textContent.trim()) {
            showToast(successMsg.textContent.trim());
            // Hide the static message
            successMsg.style.display = 'none';
            // Redirect to events-dashboard after showing toast
            setTimeout(function() {
                window.location.href = '/events-dashboard';
            }, 2000);
        }

        if (errorMsg && errorMsg.textContent.trim()) {
            showToast(errorMsg.textContent.trim());
            // Hide the static message
            errorMsg.style.display = 'none';
        }
    });
</script>
</body>
</html>
