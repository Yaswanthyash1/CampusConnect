<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Event Details</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027; --bg2: #203a43; --bg3: #2c5364;
            --accent: #3ec1d3; --accent2: #a0e7e5; --text: #ffffff;
            --glass: rgba(255,255,255,0.12); --shadow: 0 10px 25px rgba(0,0,0,0.35); --muted: rgba(255,255,255,0.8);
        }
        body { margin:0; font-family:'League Spartan',sans-serif; background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3)); background-attachment:fixed; color:var(--text); min-height:100vh; }
        .navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 40px; background:rgba(255,255,255,0.05); backdrop-filter:blur(12px); position:sticky; top:0; z-index:10; }
        .navbar h1{ margin:0; font-size:28px; }
        .navbar .right{ display:flex; gap:15px; align-items:center; }
        .nav-btn{ padding:8px 14px; border:none; border-radius:8px; background:linear-gradient(145deg,var(--accent),var(--accent2)); color:#0c1f28; font-weight:600; cursor:pointer; transition:transform .15s ease; text-decoration:none; }
        .nav-btn:hover{ transform:scale(1.05); }
        .container{ max-width:900px; margin:40px auto; padding:32px; background:var(--glass); border-radius:16px; box-shadow:var(--shadow); }
        .project-hero{ display:flex; gap:22px; align-items:flex-start; padding:22px; margin-bottom:30px; background:rgba(255,255,255,0.05); border-radius:12px; }
        .hero-left{ flex:1; }
        .hero-title{ font-size:28px; margin:0 0 6px; color:var(--accent); }
        .hero-sub{ color:var(--muted); margin:0 0 12px; font-size:16px; }
        .hero-desc{ margin-top:6px; color:var(--text); line-height:1.6; white-space:pre-wrap; }
        .hero-actions{ display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
        .status-badge{ padding:8px 16px; border-radius:20px; font-size:14px; font-weight:600; text-transform:uppercase; }
        .status-upcoming{ background:#17a2b8; color:#fff; }
        .status-completed{ background:#28a745; color:#fff; }
        .status-closed{ background:#dc3545; color:#fff; }
        .details-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:30px; }
        .detail-card{ background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01)); padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); border-left:4px solid var(--accent); }
        .detail-card .label{ font-weight:700; color:var(--accent2); margin-bottom:6px; display:block; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        .detail-card .value{ color:var(--text); font-size:16px; }
        .back-row{ margin-top:20px; display:flex; justify-content:flex-start; gap:12px; }
        .btn{ padding:12px 24px; border:none; border-radius:25px; font-weight:600; cursor:pointer; transition:all .3s ease; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary{ background:linear-gradient(145deg,var(--accent),var(--accent2)); color:#0c1f28; }
        .btn-secondary{ background:rgba(255,255,255,0.1); color:var(--text); border:2px solid rgba(255,255,255,0.2); }
        .btn:hover{ transform:translateY(-2px); filter:brightness(1.1); }
        @media (max-width:700px){ .project-hero{ flex-direction:column; } .hero-actions{ align-items:stretch; } }
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div class="right">
        <a class="nav-btn" th:href="@{/events-dashboard}">Back to Events</a>
        <a class="nav-btn" th:href="@{/home}">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="container">
    <div class="project-hero">
        <div class="hero-left">
            <h1 class="hero-title" th:text="${event.eventName}">Event Name</h1>
            <div class="hero-sub">Organized by: <span th:text="${event.clubName}">Club Name</span></div>
            <div class="hero-desc" th:text="${event.description}">Full event description...</div>
        </div>
        <div class="hero-actions">
            <span class="status-badge" th:classappend="${isUpcoming} ? ' status-upcoming' : ' status-closed'" th:text="${isUpcoming} ? 'Upcoming' : 'Closed'">Status</span>
        </div>
    </div>

    <div class="details-grid">
        <div class="detail-card">
            <span class="label">Date & Time</span>
            <div class="value" th:text="${event.timestamp != null ? #dates.format(event.timestamp,'dd MMM yyyy HH:mm') : 'TBA'}">Date</div>
        </div>
        <div class="detail-card">
            <span class="label">Location</span>
            <div class="value" th:text="${event.venue}">Location</div>
        </div>
        <div class="detail-card">
            <span class="label">Type</span>
            <div class="value" th:text="${event.type}">Type</div>
        </div>
        <div class="detail-card">
            <span class="label">Budget</span>
            <div class="value">₹ <span th:text="${event.budget}">Budget</span></div>
        </div>
        <div class="detail-card">
            <span class="label">Registration</span>
            <div class="value">
                <a class="btn btn-primary" target="_blank" th:href="${event.registrationLink}"
                   th:if="${isUpcoming and event.registrationLink != null and event.registrationLink != ''}">Register Now</a>
                <span class="btn btn-secondary" th:if="${isUpcoming and (event.registrationLink == null or event.registrationLink == '')}">Closed</span>
                <span class="btn btn-secondary" th:if="${!isUpcoming}">Registration Closed</span>
            </div>
        </div>
    </div>

    <div class="back-row">
        <a class="btn btn-primary" th:href="@{/events-dashboard}">← Back to Events</a>
        <a class="btn btn-secondary" th:href="@{/home}">Home</a>
    </div>
</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        showToast('Logging out...');
        setTimeout(() => { window.location.href = '/login'; }, 500);
    });
    function showToast(message) {
        const t = document.createElement('div');
        t.textContent = message;
        t.style.position = 'fixed'; t.style.top = '20px'; t.style.left = '50%'; t.style.transform = 'translateX(-50%)';
        t.style.background = 'rgba(0,0,0,0.85)'; t.style.color = '#fff'; t.style.padding = '10px 14px'; t.style.borderRadius = '8px';
        t.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)'; t.style.zIndex = '11000'; t.style.fontSize = '14px'; t.style.opacity = '0';
        t.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        document.body.appendChild(t);
        t.style.transform = 'translateX(-50%)) translateY(-6px)';
        requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
        setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(-6px)'; setTimeout(()=> t.remove(), 300); }, 2200);
    }
</script>
</body>
</html>
