<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Club Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'League Spartan',sans-serif; background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3)); color:var(--text); min-height:100vh; }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:1100px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h1{color:var(--accent)}
        .dashboard{background:transparent;padding:10px}
        .logout-btn{padding:8px 12px;border-radius:8px;background:linear-gradient(145deg,var(--accent),var(--accent2));border:none;color:#0c1f28;font-weight:600}
        .pending-requests-btn{display:inline-block;margin:12px 0;padding:8px 12px;border-radius:8px;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;text-decoration:none}
        .event{padding:20px;border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text);margin-bottom:16px}
        .centered-buttons { text-align: center; margin-bottom: 20px; }
        .centered-buttons .nav-btn { margin: 0 10px; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home" style="margin-right:12px;">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>
<div class="container">
    <div class="dashboard">
        <h1 th:text="'Hi, ' + ${club.clubName} + ' Club Head!'"></h1> <!-- Greeting for the club head -->

        <div class="club-details">
            <p>Type: <span th:text="${club.clubType}"></span></p>
            <p>Faculty ID: <span th:text="${club.facultyId}"></span></p>
            <p>Head SRN: <span th:text="${club.headSrn}"></span></p>
        </div>

        <div class="centered-buttons"> <!-- Centered content -->
            <button class="nav-btn" onclick="showContent('members')">Members</button>
            <button class="nav-btn" onclick="showContent('events')">Events</button>
        </div>

        <div class="content" id="members-content" style="display:none;"> <!-- Content for members -->
            <h3 th:text="'Members List:'"></h3>
            <ul>
                <li th:each="member : ${clubMembers}" th:text="${member['SRN']}"></li> <!-- Display member SRNs -->
            </ul>
        </div>

        <div class="content" id="events-content" style="display:none;"> <!-- Content for events -->
            <h3 th:text="'Upcoming Events:'"></h3> <!-- Title for events section -->
            <ul> <!-- List to display event details -->
                <li th:each="event : ${clubEvents}">
                    <strong th:text="${event['eventname']}"></strong> <!-- Event name -->
                    <p>
                        <span th:text="'Location: ' + ${event['loc']}"></span> <!-- Event location -->
                        <br>
                        <span th:text="'Description: ' + ${event['description']}"></span> <!-- Event description -->
                        <br>
                        <span th:text="'Type: ' + ${event['type']}"></span> <!-- Event type -->
                        <br>
                        <span th:text="'Budget: $' + ${event['budget']}"></span> <!-- Event budget -->
                        <br>
                        <span th:text="'Timestamp: ' + ${event['timestamp']}"></span> <!-- Event timestamp -->
                        <br>
                        <a target="_blank" th:href="${event['registration_link']}">Register Here</a>
                        <!-- Link to registration -->
                    </p>
                </li>
            </ul>
            <a class="add-event-btn" th:href="@{/event}">Add New Event</a> <!-- Link to add a new event -->
        </div>
    </div>
</div>

<script>
    function showContent(option) {
        const membersContent = document.getElementById("members-content");
        const eventsContent = document.getElementById("events-content");

        // Hide all content initially
        membersContent.style.display = "none";
        eventsContent.style.display = "none";

        // Show the selected content
        if (option === "members") {
            membersContent.style.display = "block";
        } else if (option === "events") {
            eventsContent.style.display = "block";
        }
    }

    // Logout handler
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            window.location.href = '/'; // Redirect to home page
        });
    }
</script>
</body>
</html>
