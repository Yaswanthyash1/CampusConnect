<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>PESU Clubs</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'League Spartan',sans-serif; background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3)); color:var(--text); min-height:100vh; }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .container{max-width:1100px;margin:60px auto;padding:28px;background:var(--glass);border-radius:14px;box-shadow:var(--shadow)}
        h1{color:var(--accent)}
        .event{padding:20px;border-radius:10px;background:rgba(255,255,255,0.06);color:var(--text);margin-bottom:16px}
        .event h3{color:var(--accent)}
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home" style="margin-right:12px;">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>
<div class="container">
    <div class="header">
        <h1>Clubs:</h1>
    </div>
    <div class="event-container">
        <div th:each="club : ${clubs}">
            <div class="event">
                <h3 th:text="${club['clubName']}"></h3>
                <p>Type: <span th:text="${club['club_type']}"></span></p>
                <p>Department: <span th:text="${club['dept']}"></span></p>
                <p>Club Head Email: <span th:text="${club['email']}"></span></p>
                <p>Club Head SRN: <span th:text="${club['head_srn']}"></span></p>
                <p>Member Count: <span th:text="${club['memberCount']}"></span></p>
                <p>Total Budget: <span th:text="${club['totalBudget']}"></span></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
