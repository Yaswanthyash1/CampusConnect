<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Event Details</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        /* Page-specific enhancements for event details */
        .event-hero { display:flex; gap:22px; align-items:flex-start; padding:22px; }
        .hero-left { flex:1 }
        .hero-title { font-size:28px; margin:0 0 6px; }
        .hero-sub { color:var(--muted); margin:0 0 12px; }
        .hero-desc { margin-top:6px; color:var(--muted); line-height:1.6 }
        .hero-actions { display:flex; flex-direction:column; gap:10px; align-items:flex-end }
        .details-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-top:20px }
        .detail-card { background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); }
        .detail-card .label { font-weight:700; color:var(--accent2); margin-bottom:6px; display:block }
        .detail-card .value { color:var(--muted) }
        .back-row { margin-top:20px; display:flex; justify-content:flex-start; gap:12px }
        @media (max-width:700px){ .event-hero{flex-direction:column} .hero-actions{align-items:stretch} }
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/home" style="margin-right:12px;">Home</a>
        <button class="nav-btn" id="logoutBtn">Logout</button>
    </div>
</div>
<div class="container fade-in">

    <div class="event-hero card">
        <div class="hero-left">
            <h2 class="hero-title" th:text="${event.eventName}">Event Name</h2>
            <div class="hero-sub">Organized by: <span th:text="${event.clubName}">Club Name</span></div>
            <div class="hero-desc" th:text="${event.description}">Full event description goes here...</div>
        </div>
        <div class="hero-actions">
            <a class="btn" target="_blank" th:href="${event.registrationLink}" th:if="${event.registrationLink}">Register
                Now</a>
            <span class="btn btn-secondary" th:if="${event.registrationLink == null or event.registrationLink == ''}">Registration Closed</span>
            <a class="btn btn-secondary" th:href="@{'/events'}">Back to Events</a>
        </div>
    </div>

    <div class="details-grid">
        <div class="detail-card">
            <div class="label">Date & Time</div>
            <div class="value" th:text="${#dates.format(event.timestamp, 'yyyy-MM-dd HH:mm')}">Date</div>
        </div>
        <div class="detail-card">
            <div class="label">Location</div>
            <div class="value" th:text="${event.location}">Location</div>
        </div>
        <div class="detail-card">
            <div class="label">Type</div>
            <div class="value" th:text="${event.type}">Type</div>
        </div>
        <div class="detail-card">
            <div class="label">Budget</div>
            <div class="value">₹ <span th:text="${event.budget}">Budget</span></div>
        </div>
        <div class="detail-card">
            <div class="label">Registration Link</div>
            <div class="value">
                <a target="_blank" th:href="${event.registrationLink}" th:if="${event.registrationLink}"
                   th:text="${event.registrationLink}">Link</a>
                <span th:if="${event.registrationLink == null or event.registrationLink == ''}">Closed</span>
            </div>
        </div>
    </div>

</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
</script>
</body>
</html>
