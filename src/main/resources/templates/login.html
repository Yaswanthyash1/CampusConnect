<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --accent: #3ec1d3;
            --accent2: #a0e7e5;
            --text: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'League Spartan',sans-serif; background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3)); color:var(--text); min-height:100vh; }
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
        .navbar h1{margin:0;font-size:24px}
        .nav-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:600;text-decoration:none;cursor:pointer}
        .auth{max-width:420px;margin:80px auto;padding:28px;background:var(--glass);border-radius:12px;box-shadow:var(--shadow)}
        .auth h1{color:var(--accent);margin-bottom:14px;text-align:center}
        input,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text);margin:8px 0}
        button[type="submit"]{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#0c1f28;font-weight:700;cursor:pointer}
    </style>
</head>
<body>
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div>
        <a class="nav-btn" href="/register">Register</a>
    </div>
</div>
<div class="auth">
    <h1>Login</h1>
    <form action="/auth/login" id="loginForm" method="post">
        <select id="userType" name="userType">
            <option value="">Select User Type</option>
            <option value="member">Member</option>
            <option value="clubHead">Club Head</option>
            <option value="faculty">Faculty</option>
        </select>
        <div id="srnField">
            <input id="srn" name="srn" placeholder="SRN" type="text">
        </div>
        <div id="clubNameField">
            <input id="clubName" name="clubName" placeholder="Club Name" type="text">
        </div>
        <div id="facultyEmailField">
            <input id="facultyEmail" name="email" placeholder="Email" type="text">
        </div>
        <input id="password" name="password" placeholder="Password" type="password">
        <button type="submit">Login</button>
    </form>
</div>

<script>
    const userTypeSelect = document.getElementById('userType');
    const srnField = document.getElementById('srnField');
    const clubNameField = document.getElementById('clubNameField');
    const facultyEmailField = document.getElementById('facultyEmailField');

    userTypeSelect.addEventListener('change', () => {
        if (userTypeSelect.value === 'member') {
            srnField.style.display = 'block';
            clubNameField.style.display = 'none';
            facultyEmailField.style.display = 'none';
        } else if (userTypeSelect.value === 'clubHead') {
            srnField.style.display = 'none';
            clubNameField.style.display = 'block';
            facultyEmailField.style.display = 'none';
        } else if (userTypeSelect.value === 'faculty') {
            srnField.style.display = 'none';
            clubNameField.style.display = 'none';
            facultyEmailField.style.display = 'block';
        } else {
            srnField.style.display = 'none';
            clubNameField.style.display = 'none';
            facultyEmailField.style.display = 'none';
        }
    });


    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent the form from submitting normally

        const userType = document.getElementById('userType').value;
        const srn = document.getElementById('srn').value;
        const clubName = document.getElementById('clubName').value;
        const facultyEmail = document.getElementById('facultyEmail').value;
        const password = document.getElementById('password').value;

        // Build payload with field names expected by backend
        const loginData = { userType, password };
        if (userType === 'member') {
            loginData.srn = srn;
        } else if (userType === 'clubHead') {
            loginData.clubName = clubName;
        } else if (userType === 'faculty') {
            loginData.email = facultyEmail;
        }

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // Specify JSON content type
                },
                body: JSON.stringify(loginData) // Convert loginData to JSON string
            });

            if (response.ok) {
                let data = null;
                try { data = await response.json(); } catch (e) {}
                // Persist minimal session context for homepage role actions
                localStorage.setItem('userType', userType);
                if (data && data.userIdentifier) {
                    localStorage.setItem('userIdentifier', data.userIdentifier);
                } else {
                    // Fallback when backend doesn't send JSON
                    if (userType === 'member') localStorage.setItem('userIdentifier', srn);
                    else if (userType === 'clubHead') localStorage.setItem('userIdentifier', clubName);
                    else if (userType === 'faculty') localStorage.setItem('userIdentifier', facultyEmail);
                }
                window.location.href = '/home';
            } else {
                // Handle unsuccessful login response
                console.error('Login failed:', response.statusText);
                const text = await response.text();
                alert(text || 'Login failed');
            }
        } catch (error) {
            // Handle network or other errors
            console.error('Error:', error);
            alert('Network error');
        }
    });
</script>
</body>
</html>
