<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>NITK Clubs</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg1: #0f2027; --bg2: #203a43; --bg3: #2c5364;
          --accent: #3ec1d3; --accent2: #a0e7e5;
          --text: #ffffff; --glass: rgba(255, 255, 255, 0.12);
          --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        body {
          margin: 0;
          font-family: 'League Spartan', sans-serif;
          background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
          background-attachment: fixed;
          color: var(--text);
        }

        /* Navbar */
        .navbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 18px 40px;
          background: rgba(255,255,255,0.05);
          backdrop-filter: blur(12px);
          position: sticky;
          top: 0;
          z-index: 10;
        }
        .navbar h1 { margin: 0; font-size: 28px; }
        .navbar .right { display: flex; gap: 15px; align-items: center; }
        .logout-btn {
          padding: 8px 14px; border: none; border-radius: 8px;
          background: linear-gradient(145deg,var(--accent),var(--accent2));
          color: #0c1f28; font-weight: 600; cursor: pointer;
          transition: transform .15s ease;
        }
        .logout-btn:hover { transform: scale(1.05); }

        /* Welcome */
        .welcome {
          text-align: center; padding: 60px 20px 40px;
        }
        .welcome h2 { font-size: 38px; margin-bottom: 10px; }
        .welcome p { font-size: 18px; opacity: 0.9; }

        /* Role Actions */
        #roleActions {
          display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
          gap: 24px; margin: 40px auto; max-width: 1000px; padding: 0 20px;
        }
        .role-card {
          background: var(--glass);
          border-radius: 16px;
          padding: 28px;
          text-align: center;
          box-shadow: var(--shadow);
          transition: transform .2s ease, border-color .2s ease;
          border: 1px solid rgba(255,255,255,0.15);
        }
        .role-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .role-card h3 { margin: 0 0 16px; font-size: 22px; }
        .role-card .btn {
          display: inline-block;
          margin: 6px 5px;
          padding: 10px 16px;
          border-radius: 10px;
          border: none;
          cursor: pointer;
          background: linear-gradient(145deg,var(--accent),var(--accent2));
          font-weight: 600;
          color: #0c1f28;
          text-decoration: none;
        }
        .role-card .btn:hover { filter: brightness(1.05); }

        /* Clubs Section for Faculty */
        .event-section { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        .event-section h2 { text-align: center; margin-bottom: 30px; font-size: 30px; }
        .events-grid {
          display: grid; gap: 24px;
          grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        .event-card {
          background: rgba(255,255,255,0.9);
          border-radius: 14px;
          padding: 20px;
          color: #000;
          box-shadow: 0 5px 15px rgba(0,0,0,0.2);
          transition: transform .15s ease;
        }
        .event-card:hover { transform: translateY(-4px); }
        .event-card h3 { color: var(--accent); margin: 0 0 12px; }
        .event-card p { margin: 5px 0; font-size: 15px; }
        .event-card .btn { margin-top: 10px; }
    </style>
</head>
<body>
<!-- Navbar -->
<div class="navbar">
    <h1>NITK CLUBS</h1>
    <div class="right">
        <span id="roleTag"></span>
        <button class="logout-btn" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</div>

<!-- Welcome -->
<div class="welcome">
    <h2 id="welcomeTitle">Welcome to NITK Clubs!</h2>
    <p id="welcomeDesc">Discover, join, and lead communities at NITK.</p>
</div>

<!-- Role Actions -->
<div id="roleActions"></div>

<!-- Clubs Section for Faculty -->
<div class="event-section" th:if="${clubs}">
    <h2>All Clubs</h2>
    <div class="events-grid">
        <div class="event-card" th:each="club : ${clubs}">
            <h3 th:text="${club.club_name}"></h3>
            <p th:text="${club.description}"></p>
            <p><b>Faculty ID:</b> <span th:text="${club.faculty_id}"></span></p>
            <p><b>Club Type:</b> <span th:text="${club.club_type}"></span></p>
            <p><b>Head SRN:</b> <span th:text="${club.head_srn}"></span></p>
            <p><b>Department:</b> <span th:text="${club.dept}"></span></p>
            <p><b>Phone:</b> <span th:text="${club.phoneno}"></span></p>
        </div>
    </div>
</div>

<script>
    const userType = localStorage.getItem('userType');
    const userIdentifier = localStorage.getItem('userIdentifier');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const welcomeDesc = document.getElementById('welcomeDesc');
    const roleActionsDiv = document.getElementById('roleActions');
    const logoutBtn = document.getElementById('logoutBtn');
    const roleTag = document.getElementById('roleTag');

    if (userType && userIdentifier) {
      logoutBtn.style.display = 'inline-block';
      roleTag.textContent = userType.toUpperCase();
      welcomeTitle.textContent = `Welcome, ${userIdentifier}`;
      welcomeDesc.textContent = `You're logged in as ${userType}.`;

      if (userType === 'member') {
        roleActionsDiv.innerHTML = `
          <div class="role-card">
            <h3>Member Dashboard</h3>
            <a class="btn" href="/member/${userIdentifier}">My Dashboard</a>
            <a class="btn" href="/events/upcoming">Upcoming Events</a>
            <a class="btn" href="/events/past">Past Events</a>
            <a class="btn" href="/request">Request</a>
          </div>`;
      } else if (userType === 'clubHead') {
        roleActionsDiv.innerHTML = `
          <div class="role-card">
            <h3>Club Head Panel</h3>
            <a class="btn" href="/club/${userIdentifier}">Manage Members</a>
            <a class="btn" href="/club/${userIdentifier}/requests">View Requests</a>
            <a class="btn" href="/club/${userIdentifier}/processed-requests">Processed Requests</a>
            <a class="btn" href="/add-event">Create Event</a>
          </div>`;
      } else if (userType === 'faculty') {
        roleActionsDiv.innerHTML = `
          <div class="role-card">
            <h3>Faculty Panel</h3>
            <a class="btn" href="/faculty/${userIdentifier}">My Clubs</a>
            <a class="btn" href="/events">Upcoming Events</a>
          </div>`;
      }
    } else {
      welcomeDesc.textContent = "Please log in to see your dashboard.";
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/login';
    });
</script>
</body>
</html>
