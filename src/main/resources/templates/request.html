<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Member Request</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        body {
            font-family: 'League Spartan', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }

        /* Top Navbar */
        .navbar {
            display: flex;
            justify-content: flex-end;
            padding: 16px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }

        .nav-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(145deg,#3ec1d3,#a0e7e5);
            color: #0c1f28;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-btn:hover {
            filter: brightness(1.1);
        }

        /* Main Container */
        .container {
            max-width: 650px;
            margin: 50px auto;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            padding: 40px 30px;
        }

        h2 {
            color: #3ec1d3;
            margin-bottom: 35px;
            text-align: center;
            font-size: 28px;
        }

        .option {
            background: rgba(255,255,255,0.12);
            border-radius: 12px;
            margin-bottom: 28px;
            padding: 28px 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            transition: transform .2s ease, background .2s ease;
        }

        .option:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.16);
        }

        .option h3 {
            margin: 0 0 12px;
            color: #a0e7e5;
            font-size: 20px;
        }
        .option p {
            margin: 0 0 18px;
            opacity: 0.85;
            font-size: 15px;
            line-height: 1.5;
        }

        .option .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #3ec1d3;
            color: #0c1f28;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s ease;
        }
        .option .btn:hover {
            background: #a0e7e5;
        }

        /* Request Form Styles */
        #requestFormContainer {
            display: none;
            margin-top: 32px;
        }
        #requestForm {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        #requestForm label {
            font-weight: 600;
            color: #a0e7e5;
        }
        #requestForm textarea {
            width: 100%;
            margin: 12px 0 18px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        #requestForm input[type="file"] {
            margin: 12px 0 18px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a class="nav-btn" href="/home" style="margin-right: 16px;">Home</a>
    <button class="nav-btn" id="logoutBtn">Logout</button>
</div>

<!-- Content -->
<div class="container">
    <h2>Member Request Options</h2>

    <div class="option">
        <h3>Suggest an Idea</h3>
        <p>Share your ideas to improve clubs, events, or campus life.</p>
        <button class="btn" onclick="showForm('idea')">Suggest Idea</button>
    </div>
    <div class="option">
        <h3>Raise a Query</h3>
        <p>Ask questions or raise concerns to club heads or faculty.</p>
        <button class="btn" onclick="showForm('query')">Raise Query</button>
    </div>
    <div class="option">
        <h3>Project/Event Proposal</h3>
        <p>Submit a proposal for a new project or event.</p>
        <button class="btn" onclick="showForm('proposal')">Submit Proposal</button>
    </div>

    <!-- Dynamic Request Form -->
    <div id="requestFormContainer">
        <form action="/submit-request" enctype="multipart/form-data" id="requestForm" method="post">
            <input id="requestType" name="type" type="hidden">
            <input id="memberId" name="memberId" type="hidden">
            <label for="description">Description:</label><br>
            <textarea id="description" name="description" required rows="4"></textarea><br>
            <label for="requestFile">Upload file (PDF, Word, TXT):</label><br>
            <input accept=".pdf,.doc,.docx,.txt" id="requestFile" name="file" required type="file">
            <button class="btn" type="submit">Submit Request</button>
            <button class="btn" onclick="hideForm()" style="background:#a0e7e5;margin-left:10px;" type="button">Cancel
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.clear();
        window.location.href = '/login';
    });
    function showForm(type) {
        document.getElementById('requestFormContainer').style.display = 'block';
        document.getElementById('requestType').value = type;
        document.getElementById('memberId').value = localStorage.getItem('userIdentifier') || '';
    }
    function hideForm() {
        document.getElementById('requestFormContainer').style.display = 'none';
        document.getElementById('requestForm').reset();
    }
</script>
</body>
</html>
